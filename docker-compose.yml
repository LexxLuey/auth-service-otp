services:
  postgres:
    image: postgres:15-alpine
    container_name: auth_service_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 5s
      timeout: 3s
      retries: 3

  redis:
    image: redis:7-alpine
    container_name: auth_service_redis
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - redis_data:/data/
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 3

  web:
    build: .
    container_name: auth_service_web
    restart: unless-stopped
    command: python manage.py runserver 0.0.0.0:8000 
    volumes:
      - .:/app
    ports:
      - "${DJANGO_PORT}:8000"
    env_file:
      - .env
    environment:
      - RUN_MIGRATIONS=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    build: .
    container_name: auth_service_celery
    restart: unless-stopped
    command: celery -A config worker --loglevel=info
    volumes:
      - .:/app
    env_file:
      - .env
    environment:
      - RUN_MIGRATIONS=false
    depends_on:
      - web
      - redis
      - postgres

  # Optional: Celery Beat for periodic tasks (commented out)
  # celery_beat:
  #   build: .
  #   container_name: auth_service_beat
  #   restart: unless-stopped
  #   command: celery -A config beat --loglevel=info
  #   volumes:
  #     - .:/app
  #   env_file:
  #     - .env
  #   environment:
  #     - RUN_MIGRATIONS=false
  #     - DJANGO_SETTINGS_MODULE=config.settings
  #     - DB_HOST=postgres
  #     - REDIS_HOST=redis
  #   depends_on:
  #     - web
  #     - redis
  #     - postgres
  #   networks:
  #     - auth_network

volumes:
  postgres_data:
  redis_data:

networks:
  auth_network:
    driver: bridge
